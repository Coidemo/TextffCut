[pytest]
# pytest設定ファイル

# テストファイルの検索パターン
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# テストディレクトリ
testpaths = tests

# 出力オプション
addopts = 
    -v
    --tb=short
    --strict-markers
    --cov=core
    --cov=domain
    --cov=application
    --cov=infrastructure
    --cov=use_cases
    --cov=adapters
    --cov=presentation
    --cov=utils
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch

# マーカー定義
markers =
    unit: 単体テスト
    integration: 統合テスト
    slow: 実行時間の長いテスト
    e2e: エンドツーエンドテスト

# 警告フィルタ
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# カバレッジ設定
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*
    setup.py
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract

[coverage:html]
directory = htmlcov