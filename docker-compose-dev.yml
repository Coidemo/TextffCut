version: '3.8'

services:
  textffcut-dev:
    image: textffcut:latest
    container_name: textffcut_dev
    ports:
      - "8503:8501"
    volumes:
      # コードをマウントしてリアルタイム編集可能に
      - ./main.py:/app/main.py
      - ./config.py:/app/config.py
      - ./core:/app/core
      - ./ui:/app/ui
      - ./utils:/app/utils
      # データディレクトリ
      - ./videos:/app/videos
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tokyo
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      # デバッグ用環境変数
      - DEBUG=1
    command: ["streamlit", "run", "main.py", "--server.runOnSave", "true"]