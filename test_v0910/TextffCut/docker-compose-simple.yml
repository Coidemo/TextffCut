version: '3.8'

services:
  textffcut:
    image: textffcut:0.9.13
    container_name: TextffCut
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./videos:/app/videos
      - ./logs:/app/logs
      - ./models:/home/appuser/.cache
      - ./optimizer_profiles:/home/appuser/.textffcut
      - ./prompts:/app/prompts
    environment:
      - TZ=Asia/Tokyo
      - HOST_VIDEOS_PATH=${HOST_VIDEOS_PATH}
