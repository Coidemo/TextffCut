# Mypy設定ファイル
# TODO: 将来的にはすべてのファイルで厳密な型チェックを有効にする
#
# 改善計画:
# 1. Phase 1 (現在): core モジュールの型チェックを有効化
# 2. Phase 2: services, utils モジュールの型チェックを有効化
# 3. Phase 3: ui モジュールの型チェックを有効化
# 4. Phase 4: tests, scripts モジュールの型チェックを有効化
# 5. Phase 5: disallow_untyped_defs = True を全体に適用

[mypy]
python_version = 3.10
warn_return_any = False
warn_unused_ignores = True
ignore_missing_imports = True
strict_optional = True
check_untyped_defs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
no_implicit_optional = True

# 段階的に修正するためのファイル別設定
[mypy-tests.*]
ignore_errors = True

[mypy-scripts.*]
ignore_errors = True

[mypy-orchestrator.*]
ignore_errors = True

# UIファイルは後回し
[mypy-ui.*]
disallow_untyped_defs = False
check_untyped_defs = False

# サービス層も後回し
[mypy-services.*]
disallow_untyped_defs = False
check_untyped_defs = False