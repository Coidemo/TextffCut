version: '3.8'

services:
  textffcut:
    image: textffcut:1.1.0
    container_name: textffcut_app
    restart: no  # 自動再起動しない
    ports:
      - "8501:8501"
    volumes:
      - ./videos:/app/videos
      - ./output:/app/output
      - ./transcriptions:/app/transcriptions
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tokyo
      - HOST_VIDEOS_PATH=${PWD}/videos