version: '3.8'

name: textffcut

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - textffcut:latest
    image: textffcut:latest
    container_name: textffcut_app
    ports:
      - "${TEXTFFCUT_PORT:-8501}:8501"
    volumes:
      # 動画ファイルと出力用ディレクトリをマウント
      - ./videos:/app/videos
      # 文字起こし結果用ディレクトリをマウント
      - ./transcriptions:/app/transcriptions
      # ログ用ディレクトリをマウント
      - ./logs:/app/logs
      # 開発用: アプリケーションコードをマウント
      - ./main.py:/app/main.py
      - ./ui:/app/ui
      - ./core:/app/core
      - ./utils:/app/utils
      - ./config.py:/app/config.py
      # ホストのホームディレクトリもマウント（読み書き可能）
      - ${HOME}:${HOME}
    environment:
      # API設定（.envファイルからも読み込み可能）
      - TEXTFFCUT_USE_API=${TEXTFFCUT_USE_API:-false}
      - TEXTFFCUT_API_KEY=${TEXTFFCUT_API_KEY:-}
      
      # ログレベル
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      
      # タイムゾーン
      - TZ=Asia/Tokyo
      
    restart: unless-stopped
    
    # リソース制限（必要に応じて調整）
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    
    # ネットワーク
    networks:
      - textffcut_net

  # Nginx リバースプロキシ（オプション）
  # 本番環境でHTTPS対応する場合に使用
  # nginx:
  #   image: nginx:alpine
  #   container_name: textffcut_nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - textffcut_net

networks:
  textffcut_net:
    driver: bridge

# 永続化ボリューム（必要に応じて使用）
volumes:
  textffcut_data:
    driver: local