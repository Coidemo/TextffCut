version: '3.8'

services:
  textffcut:
    build: .
    image: textffcut:latest
    container_name: textffcut
    ports:
      - "8501:8501"
    volumes:
      # 動画ファイルディレクトリをマウント
      - ./videos:/app/videos
      # 出力用ディレクトリをマウント（videosの下に作成）
      - ./videos/output:/app/output
      # 文字起こし結果用ディレクトリ
      - ./transcriptions:/app/transcriptions
      # ログ用ディレクトリ
      - ./logs:/app/logs
    environment:
      # サブプロセス分離を有効化（メモリリーク対策）
      - TEXTFFCUT_ISOLATION_MODE=subprocess
      # API設定（.envファイルからも読み込み可能）
      - TEXTFFCUT_USE_API=${TEXTFFCUT_USE_API:-false}
      - TEXTFFCUT_API_KEY=${TEXTFFCUT_API_KEY:-}
      # メモリ節約モード（無音検出をスキップ）
      - SKIP_SILENCE_DETECTION=true
      # 並列処理の閾値（GB）- Docker環境では低めに設定
      - PARALLEL_MEMORY_THRESHOLD=${PARALLEL_MEMORY_THRESHOLD:-4}
      # ホスト側のビデオパス（表示用）
      - HOST_VIDEOS_PATH=${PWD}/videos
    restart: unless-stopped
    # メモリ制限を増やす（または削除）
    # mem_limit: 8g  # コメントアウトして制限を解除