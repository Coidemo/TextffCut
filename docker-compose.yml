version: '3.8'

name: textffcut

services:
  textffcut:
    build: .
    ports:
      - "8501:8501"
    volumes:
      # 動画ファイルと出力用ディレクトリをマウント
      - ./videos:/app/videos
      # 文字起こし結果用ディレクトリをマウント
      - ./transcriptions:/app/transcriptions
      # ログ用ディレクトリをマウント
      - ./logs:/app/logs
      # 開発用: アプリケーションコードをマウント
      - ./main.py:/app/main.py
      - ./ui:/app/ui
      - ./core:/app/core
      - ./utils:/app/utils
      - ./config.py:/app/config.py
      # ホストのホームディレクトリもマウント（読み書き可能）
      - ${HOME}:${HOME}
    environment:
      # Streamlit設定
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501
      # 日本語ロケール設定
      - LANG=ja_JP.UTF-8
      - LC_ALL=ja_JP.UTF-8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

