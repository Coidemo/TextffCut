services:
  textffcut:
    build: .
    image: textffcut:0.9.6
    container_name: textffcut_app
    restart: no  # 自動再起動しない
    ports:
      - "8501:8501"
    volumes:
      - ./videos:/app/videos
      - ./transcriptions:/app/transcriptions
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tokyo
      - HOST_VIDEOS_PATH=${PWD}/videos