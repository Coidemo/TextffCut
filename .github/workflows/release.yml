name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate sha256 of source tarball
        id: sha
        run: |
          TAG=${GITHUB_REF_NAME}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## インストール
            ```bash
            brew tap coidemo/textffcut
            brew install textffcut
            ```

            ## 初回セットアップ
            ```bash
            textffcut activate XXXXX-XXXXX-XXXXX-XXXXX  # Note購入後に届くキー
            textffcut gui                                 # GUIを起動
            ```

            ## Homebrew Formula 更新用
            - **URL**: `${{ steps.sha.outputs.url }}`
            - **SHA256**: `${{ steps.sha.outputs.sha256 }}`
